$kind: http-request
name: Create Project
method: POST
url: '{{base_url}}/projects/'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "My Web App",
      "description": "A responsive web application",
      "type": "front-end"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200 or 201', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      const data = pm.response.json();
      const projectId = data.id;

      pm.test('Project id present', function () {
        pm.expect(projectId, 'id').to.exist;
      });

      pm.environment.set('project_id', String(projectId));
