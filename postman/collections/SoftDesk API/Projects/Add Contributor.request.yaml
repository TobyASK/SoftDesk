$kind: http-request
name: Add Contributor
method: POST
url: '{{base_url}}/projects/{{project_id}}/contributor/'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: project_id
    value: '{{project_id}}'
body:
  type: json
  content: |-
    {
      "user_id": 2
    }
