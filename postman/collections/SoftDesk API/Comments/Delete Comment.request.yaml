$kind: http-request
name: Delete Comment
method: DELETE
url: '{{base_url}}/projects/{{project_id}}/issues/{{issue_id}}/comments/{{comment_uuid}}/'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: project_id
    value: '{{project_id}}'
  - key: issue_id
    value: '{{issue_id}}'
  - key: comment_uuid
    value: '{{comment_uuid}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200 or 204', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
