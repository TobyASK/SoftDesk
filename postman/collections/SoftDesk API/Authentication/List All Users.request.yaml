$kind: http-request
name: List All Users
method: GET
url: '{{base_url}}/auth/users/?page=1&page_size=10'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
queryParams:
  - key: page
    value: '1'
  - key: page_size
    value: '10'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });
